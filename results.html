<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark light">
<meta name="theme-color" content="#12100E">
<title>Résultats du vote</title>
<style>
  :root {
    --bg:      #12100E;
    --line:    #322C25;
    --track:   #241F1A;
    --ink:     #E8E3D9;
    --dim:     #A39B8D;
    --gold:    #BDA66B;
    --gold-hi: #FFE7AB;
    --warn:    #D99B82;
    color-scheme: dark;
  }
  /* Unlike the ballot, this page may well be read in daylight, so it follows
     the device preference instead of forcing dark. The golds are darkened in
     light mode; #BDA66B on cream is only 2.2:1 and cannot carry text. */
  @media (prefers-color-scheme: light) {
    :root {
      --bg:      #FAF9F6;
      --line:    #E2DCD0;
      --track:   #E6E0D4;
      --ink:     #2A2318;
      --dim:     #6E6659;
      --gold:    #7A6636;   /* 5.2:1 on --bg */
      --gold-hi: #5A4A24;   /* 8.1:1 on --bg */
      --warn:    #A3563B;
      color-scheme: light;
    }
  }
  * { box-sizing: border-box; }
  html, body { background: var(--bg); }
  /* clamp() throughout so the page still reads if it is ever projected. */
  body { max-width: 760px; margin: 0 auto; padding: clamp(20px, 3vw, 40px);
         color: var(--ink); font-family: system-ui, -apple-system, sans-serif;
         line-height: 1.45; -webkit-text-size-adjust: 100%; }
  .eyebrow { margin: 0 0 10px; font-size: clamp(.68rem, 1.1vw, .85rem); letter-spacing: .3em;
             text-transform: uppercase; color: var(--gold); }
  h1 { margin: 0 0 8px; font-family: Georgia, "Times New Roman", serif; font-weight: 400;
       font-size: clamp(1.6rem, 4.2vw, 3rem); line-height: 1.1; }
  .meta { margin: 0 0 22px; color: var(--dim); font-size: clamp(.82rem, 1.5vw, 1.05rem); }
  .rule { width: 44px; height: 1px; background: var(--gold); opacity: .7; margin: 0 0 22px; }

  .row { margin: 0 0 clamp(14px, 2vw, 22px); }
  .toplabel { display: flex; justify-content: space-between; align-items: baseline; gap: 14px;
              margin-bottom: 6px; }
  .toplabel .t { font-size: clamp(.95rem, 1.9vw, 1.35rem); }
  .toplabel .n { flex: none; font-variant-numeric: tabular-nums; font-weight: 600;
                 color: var(--gold); font-size: clamp(.95rem, 1.9vw, 1.35rem); }
  .bar-bg { background: var(--track); border-radius: 5px; overflow: hidden;
            height: clamp(12px, 1.8vw, 22px); }
  .bar { height: 100%; background: var(--gold); width: 0; transition: width .45s ease; }
  /* Three pieces get played, so all three leaders are marked, not just one. */
  .winner .bar { background: var(--gold-hi); }
  .winner .toplabel .t, .winner .toplabel .n { color: var(--gold-hi); }
  .tag { margin-left: 10px; padding: 2px 7px; white-space: nowrap; border-radius: 4px;
         border: 1px solid var(--gold-hi); color: var(--gold-hi);
         font-size: clamp(.6rem, 1vw, .72rem); letter-spacing: .2em; text-transform: uppercase; }

  .skel   { height: clamp(12px, 1.8vw, 22px); border-radius: 5px; background: var(--track);
            animation: shim 1.5s ease-in-out infinite; }
  .skel-t { height: .85em; width: var(--w, 60%); margin-bottom: 7px; border-radius: 4px;
            background: var(--track); animation: shim 1.5s ease-in-out infinite; }
  @keyframes shim { 50% { opacity: .42 } }

  .empty, .fail { padding: 44px 24px; text-align: center; border: 1px solid var(--line);
                  border-radius: 12px; }
  .fail { border-color: var(--warn); }
  .empty strong, .fail strong { display: block; margin-bottom: 8px; font-weight: 400;
         font-family: Georgia, "Times New Roman", serif; font-size: clamp(1.1rem, 2.4vw, 1.5rem); }
  .fail strong { color: var(--warn); }
  .empty span, .fail span { color: var(--dim); font-size: clamp(.85rem, 1.5vw, 1rem); }
  .fail button { margin-top: 18px; min-height: 48px; padding: 0 26px; background: transparent;
                 border: 1px solid var(--warn); border-radius: 8px; color: var(--warn);
                 font: inherit; cursor: pointer; }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>
<p class="eyebrow">✦ Minute Concerts</p>
<h1>Dépouillement</h1>
<p class="meta"><span id="cid"></span> · ≈ <span id="ballots">0</span> votant(s) · mise à jour automatique</p>
<div class="rule"></div>
<div id="results"></div>

<script>
// ========== CONFIG : à remplir (mêmes valeurs que vote.html) ==========
const SUPABASE_URL      = "https://emcntansodqcrjiwsmpg.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_XtiLwWVgGoIoR29HUBaAYQ_qDoVW0AK";
// Ouvrez cette page avec le concert voulu dans l'URL :  results.html#c=<id>
const CONCERT_ID        = new URLSearchParams(location.hash.slice(1)).get("c") || "bordeaux-2026-01";
// Facultatif : afficher les titres complets au lieu des id
const TITLES = {
  "ravel-pavane":                    "Ravel — Pavane pour une infante défunte",
  "faure-apres-un-reve":             "Fauré — Après un rêve",
  "tailleferre-quatuor":             "Tailleferre — Quatuor à cordes",
  "carreno-quatuor":                 "Teresa Carreño — Quatuor à cordes en si mineur",
  "imogen-holst-phantasy":           "Imogen Holst — Phantasy Quartet",
  "debussy-quatuor-1":               "Debussy — Quatuor, I. Animé et très décidé",
  "ravel-quatuor-2":                 "Ravel — Quatuor, II. Assez vif",
  "borodine-nocturne":               "Borodine — Nocturne (Quatuor n° 2)",
  "barber-adagio":                   "Barber — Adagio (Quatuor op. 11)",
  "puccini-crisantemi":              "Puccini — Crisantemi",
  "mozart-dissonances-1":            "Mozart — Quatuor « Les Dissonances », I",
  "haydn-empereur-2":                "Haydn — Quatuor « L’Empereur », II. Poco adagio",
  "schubert-jeune-fille-2":          "Schubert — La Jeune Fille et la Mort, II",
  "beethoven-op18-1-adagio":         "Beethoven — Quatuor op. 18 n° 1, II. Adagio",
  "dvorak-americain-2":              "Dvořák — Quatuor « Américain », II. Lento",
  "fanny-mendelssohn-quatuor":       "Fanny Mendelssohn — Quatuor en mi bémol",
  "boulanger-nocturne":              "Lili Boulanger — Nocturne (arr.)",
  "clara-schumann-romance":          "Clara Schumann — Romance op. 22 n° 1 (arr.)",
  "price-folksongs":                 "Florence Price — Five Folksongs in Counterpoint",
  "bacewicz-quatuor-4":              "Bacewicz — Quatuor n° 4, II",
  "coleridge-taylor-fantasiestucke": "Coleridge-Taylor — Fantasiestücke, II",
  "sibelius-voces-intimae-3":        "Sibelius — Voces intimae, III. Adagio",
  "chostakovitch-8-2":               "Chostakovitch — Quatuor n° 8, II",
  "janacek-kreutzer-1":              "Janáček — Sonate à Kreutzer, I",
  "grieg-quatuor-op27-2":            "Grieg — Quatuor op. 27, II. Romanze",
  "bartok-danses-roumaines":         "Bartók — Danses populaires roumaines (arr.)",
  "glass-mishima-3":                 "Glass — Quatuor n° 3 « Mishima », III",
  "piazzolla-oblivion":              "Piazzolla — Oblivion (arr.)",
  "gershwin-lullaby":                "Gershwin — Lullaby",
  "elgar-salut-damour":              "Elgar — Salut d’Amour (arr.)",
};
// =====================================================================

document.getElementById("cid").textContent = CONCERT_ID;

const box = document.getElementById("results");
let loadedOnce = false;

function skeleton() {
  return [70, 55, 62, 48, 40].map(w =>
    '<div class="row"><div class="skel-t" style="--w:' + w + '%"></div>' +
    '<div class="skel"></div></div>').join("");
}

async function load() {
  if (!loadedOnce) box.innerHTML = skeleton();
  try {
    const res = await fetch(SUPABASE_URL + "/rest/v1/rpc/get_vote_counts", {
      method: "POST",
      headers: {
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": "Bearer " + SUPABASE_ANON_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ p_concert_id: CONCERT_ID })
    });
    if (!res.ok) throw new Error(res.status);
    render(await res.json());
    loadedOnce = true;
  } catch (e) {
    showFail();
  }
}

function showFail() {
  box.innerHTML =
    '<div class="fail"><strong>R\u00e9sultats indisponibles</strong>' +
    '<span>Impossible de joindre le serveur. La page r\u00e9essaiera toute seule.</span><br>' +
    '<button type="button" id="again">R\u00e9essayer maintenant</button></div>';
  document.getElementById("again").addEventListener("click", load);
}

function render(data) {
  if (!Array.isArray(data) || !data.length) {
    document.getElementById("ballots").textContent = "0";
    box.innerHTML =
      '<div class="empty"><strong>Aucun vote pour l\u2019instant</strong>' +
      '<span>Le d\u00e9pouillement s\u2019affichera ici d\u00e8s le premier bulletin re\u00e7u. ' +
      'Mise \u00e0 jour automatique toutes les 5 secondes.</span></div>';
    return;
  }
  const max   = Math.max(...data.map(d => Number(d.votes)));
  const total = data.reduce((s, d) => s + Number(d.votes), 0);
  document.getElementById("ballots").textContent = Math.round(total / 3);
  box.innerHTML = data.map((d, i) => {
    const title = TITLES[d.song_id] || d.song_id;
    const pct   = max ? (Number(d.votes) / max * 100) : 0;
    const win   = i < 3;   // the three that will actually be played
    return '<div class="row ' + (win ? 'winner' : '') + '">' +
      '<div class="toplabel"><span class="t">' + title +
      (win ? '<span class="tag">au programme</span>' : '') + '</span>' +
      '<span class="n">' + d.votes + '</span></div>' +
      '<div class="bar-bg"><div class="bar" style="width:' + pct + '%"></div></div></div>';
  }).join("");
}

load();
setInterval(load, 5000);   // rafra\u00eechit toutes les 5 s
</script>
</body>
</html>
