<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Votez pour le programme</title>
<style>
  :root { --accent: #6b4f8a; }
  * { box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, sans-serif; max-width: 600px;
         margin: 0 auto; padding: 24px; color: #1a1a1a; line-height: 1.4; }
  h1 { font-size: 1.4rem; margin-bottom: 4px; }
  p.instructions { color: #555; margin-top: 4px; }
  ul { list-style: none; padding: 0; }
  li { margin: 8px 0; }
  label { display: flex; align-items: center; gap: 12px; padding: 14px 16px;
          border: 1px solid #ddd; border-radius: 10px; cursor: pointer;
          transition: border-color .15s, background .15s; }
  label.checked { border-color: var(--accent); background: #f5f0fa; }
  label.disabled { opacity: .4; cursor: not-allowed; }
  input[type=checkbox] { width: 20px; height: 20px; accent-color: var(--accent); flex: none; }
  button { width: 100%; padding: 16px; font-size: 1rem; border: none; border-radius: 10px;
           background: var(--accent); color: #fff; cursor: pointer; margin-top: 16px; }
  button:disabled { background: #ccc; cursor: not-allowed; }
  .done { text-align: center; padding: 48px 0; }
  .done .check { font-size: 3rem; color: var(--accent); }
  .gate { text-align: center; padding: 48px 0; color: #555; }
  .gate .icon { font-size: 2.5rem; color: var(--accent); }
  .gate strong { display: block; color: #1a1a1a; margin-bottom: 6px; }
  .lang-switcher { display: flex; justify-content: flex-end; align-items: center; gap: 6px; margin-bottom: 12px; }
  .lang-switcher a { font-size: .8rem; font-weight: 700; letter-spacing: 1px; text-decoration: none;
                     padding: 4px 8px; border: 1px solid #ddd; border-radius: 6px; color: #999; }
  .lang-switcher a.active { background: var(--accent); border-color: var(--accent); color: #fff; }
</style>
<script>
  (function () {
    if (sessionStorage.getItem('lang-redirected')) return;
    sessionStorage.setItem('lang-redirected', '1');
    var lang = (navigator.language || navigator.userLanguage || '').toLowerCase();
    if (!lang.startsWith('fr')) {
      // carry the access token (hash fragment) across the redirect
      window.location.replace('vote-en.html' + window.location.hash);
    }
  })();
</script>
</head>
<body>
<div class="lang-switcher">
  <a href="vote.html" class="active">FR</a>
  <a href="vote-en.html">EN</a>
</div>
<div id="app">
  <h1>Votez pour 3 morceaux</h1>
  <p class="instructions">Sélectionnez exactement 3 titres, puis validez. (<span id="selected">0</span>/3)</p>
  <ul id="songs"></ul>
  <button id="submit" disabled>Valider mon vote</button>
</div>

<script>
// ========== CONFIG : à remplir ==========
const SUPABASE_URL      = "https://emcntansodqcrjiwsmpg.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_XtiLwWVgGoIoR29HUBaAYQ_qDoVW0AK";
// L'identifiant du concert ET le jeton voyagent dans le fragment d'URL du QR
// (#c=<id>&k=<jeton>). Ce fichier ne change donc JAMAIS d'un concert à l'autre :
// pour un nouveau concert, on crée une ligne dans public.concerts et on
// régénère le QR — aucun redéploiement. Le jeton n'est pas stocké ici.
// Le QR doit pointer vers :  .../vote.html#c=<id du concert>&k=<jeton>
const HASH_PARAMS       = new URLSearchParams(location.hash.slice(1));
const CONCERT_ID        = HASH_PARAMS.get("c") || "";
const SONGS = [
  { id: "ravel-pavane",        title: "Ravel — Pavane pour une infante défunte" },
  { id: "faure-apres-un-reve", title: "Fauré — Après un rêve" },
  { id: "tailleferre-quatuor", title: "Tailleferre — Quatuor à cordes" },
  // ... ajoutez tous vos titres ici (id sans espaces ni accents)
];
const MAX = 3;
// ========================================

const list = document.getElementById("songs");
const submitBtn = document.getElementById("submit");
const selectedCountEl = document.getElementById("selected");
const selected = new Set();

// Conserve le jeton quand on bascule FR <-> EN via le sélecteur de langue.
document.querySelectorAll(".lang-switcher a").forEach(a => {
  a.href = a.getAttribute("href").split("#")[0] + location.hash;
});

// Le jeton apporté par le QR code. Sa VALIDITÉ est vérifiée par le serveur,
// pas ici : on regarde seulement s'il y en a un, pour éviter d'afficher un
// bulletin qui serait de toute façon refusé.
const TOKEN = HASH_PARAMS.get("k") || "";

if (!TOKEN || !CONCERT_ID) {
  showGate();
} else if (localStorage.getItem("voted-" + CONCERT_ID)) {
  showDone("Vous avez déjà voté depuis cet appareil. Merci !");
}

SONGS.forEach(song => {
  const li = document.createElement("li");
  const label = document.createElement("label");
  const cb = document.createElement("input");
  cb.type = "checkbox";
  cb.value = song.id;
  cb.addEventListener("change", () => onToggle(cb, label));
  label.appendChild(cb);
  label.appendChild(document.createTextNode(song.title));
  li.appendChild(label);
  list.appendChild(li);
});

function onToggle(cb, label) {
  if (cb.checked) selected.add(cb.value); else selected.delete(cb.value);
  label.classList.toggle("checked", cb.checked);
  selectedCountEl.textContent = selected.size;
  const atMax = selected.size >= MAX;
  document.querySelectorAll("#songs input").forEach(box => {
    if (!box.checked) {
      box.disabled = atMax;
      box.closest("label").classList.toggle("disabled", atMax);
    }
  });
  submitBtn.disabled = selected.size !== MAX;
}

submitBtn.addEventListener("click", async () => {
  submitBtn.disabled = true;
  submitBtn.textContent = "Envoi…";
  try {
    // Tout est validé côté serveur : jeton, ouverture du vote, exactement 3
    // titres, sans doublon, appartenant bien au programme de ce concert.
    const res = await fetch(SUPABASE_URL + "/rest/v1/rpc/cast_ballot", {
      method: "POST",
      headers: {
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": "Bearer " + SUPABASE_ANON_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        p_concert_id: CONCERT_ID,
        p_token: TOKEN,
        p_song_ids: [...selected]
      })
    });
    if (!res.ok) throw new Error(await res.text());
    const status = await res.json();
    if (status === "ok") {
      localStorage.setItem("voted-" + CONCERT_ID, "1");
      showDone("Merci, votre vote est enregistré !");
    } else if (status === "closed") {
      showGate("<strong>Le vote n'est pas ouvert</strong>" +
               "Le vote se fait pendant le concert.");
    } else {
      showGate("<strong>Lien de vote non valide</strong>" +
               "Scannez le QR code imprimé sur le programme.");
    }
  } catch (e) {
    submitBtn.disabled = false;
    submitBtn.textContent = "Valider mon vote";
    alert("Erreur lors de l'envoi. Réessayez.\n\n" + e.message);
  }
});

function showDone(msg) {
  document.getElementById("app").innerHTML =
    '<div class="done"><div class="check">✓</div><p>' + msg + '</p></div>';
}

function showGate(html) {
  document.getElementById("app").innerHTML =
    '<div class="gate"><div class="icon">▣</div><p>' +
    (html || "<strong>Vote réservé au public du concert</strong>" +
             "Scannez le QR code imprimé sur le programme pour accéder au vote.") +
    '</p></div>';
}
</script>
</body>
</html>
