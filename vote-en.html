<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vote for the programme</title>
<style>
  :root { --accent: #6b4f8a; }
  * { box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, sans-serif; max-width: 600px;
         margin: 0 auto; padding: 24px; color: #1a1a1a; line-height: 1.4; }
  h1 { font-size: 1.4rem; margin-bottom: 4px; }
  p.instructions { color: #555; margin-top: 4px; }
  ul { list-style: none; padding: 0; }
  li { margin: 8px 0; }
  label { display: flex; align-items: center; gap: 12px; padding: 14px 16px;
          border: 1px solid #ddd; border-radius: 10px; cursor: pointer;
          transition: border-color .15s, background .15s; }
  label.checked { border-color: var(--accent); background: #f5f0fa; }
  label.disabled { opacity: .4; cursor: not-allowed; }
  input[type=checkbox] { width: 20px; height: 20px; accent-color: var(--accent); flex: none; }
  button { width: 100%; padding: 16px; font-size: 1rem; border: none; border-radius: 10px;
           background: var(--accent); color: #fff; cursor: pointer; margin-top: 16px; }
  button:disabled { background: #ccc; cursor: not-allowed; }
  .done { text-align: center; padding: 48px 0; }
  .done .check { font-size: 3rem; color: var(--accent); }
  .gate { text-align: center; padding: 48px 0; color: #555; }
  .gate .icon { font-size: 2.5rem; color: var(--accent); }
  .gate strong { display: block; color: #1a1a1a; margin-bottom: 6px; }
  .lang-switcher { display: flex; justify-content: flex-end; align-items: center; gap: 6px; margin-bottom: 12px; }
  .lang-switcher a { font-size: .8rem; font-weight: 700; letter-spacing: 1px; text-decoration: none;
                     padding: 4px 8px; border: 1px solid #ddd; border-radius: 6px; color: #999; }
  .lang-switcher a.active { background: var(--accent); border-color: var(--accent); color: #fff; }
</style>
<script>
  (function () {
    if (sessionStorage.getItem('lang-redirected')) return;
    sessionStorage.setItem('lang-redirected', '1');
    var lang = (navigator.language || navigator.userLanguage || '').toLowerCase();
    if (lang.startsWith('fr')) {
      // carry the access token (hash fragment) across the redirect
      window.location.replace('vote.html' + window.location.hash);
    }
  })();
</script>
</head>
<body>
<div class="lang-switcher">
  <a href="vote.html">FR</a>
  <a href="vote-en.html" class="active">EN</a>
</div>
<div id="app">
  <h1>Vote for 3 pieces</h1>
  <p class="instructions">Select exactly 3 titles, then submit. (<span id="selected">0</span>/3)</p>
  <ul id="songs"></ul>
  <button id="submit" disabled>Submit my vote</button>
</div>

<script>
// ========== CONFIG ==========
// Must match vote.html exactly (same Supabase project + same CONCERT_ID).
const SUPABASE_URL      = "https://emcntansodqcrjiwsmpg.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_XtiLwWVgGoIoR29HUBaAYQ_qDoVW0AK";
// The concert id AND the token travel in the QR URL fragment
// (#c=<id>&k=<token>), so this file never changes between concerts: for a new
// concert you add a row to public.concerts and regenerate the QR — no redeploy.
// The token is not stored here. The QR must point at:
//   .../vote-en.html#c=<concert id>&k=<token>
const HASH_PARAMS       = new URLSearchParams(location.hash.slice(1));
const CONCERT_ID        = HASH_PARAMS.get("c") || "";

// IMPORTANT: keep every `id` IDENTICAL to vote.html — the id is the vote key.
// Only translate the `title` shown to the audience.
const SONGS = [
  { id: "ravel-pavane",        title: "Ravel — Pavane for a Dead Princess" },
  { id: "faure-apres-un-reve", title: "Fauré — After a Dream" },
  { id: "tailleferre-quatuor", title: "Tailleferre — String Quartet" },
  // ... add your titles here (id must match the French page)
];
const MAX = 3;
// ============================

const list = document.getElementById("songs");
const submitBtn = document.getElementById("submit");
const selectedCountEl = document.getElementById("selected");
const selected = new Set();

// Keep the token when switching EN <-> FR via the language switcher.
document.querySelectorAll(".lang-switcher a").forEach(a => {
  a.href = a.getAttribute("href").split("#")[0] + location.hash;
});

// The token carried in by the QR code. Its VALIDITY is checked by the server,
// not here: we only look at whether one is present, to avoid showing a ballot
// that would be rejected anyway.
const TOKEN = HASH_PARAMS.get("k") || "";

if (!TOKEN || !CONCERT_ID) {
  showGate();
} else if (localStorage.getItem("voted-" + CONCERT_ID)) {
  showDone("You have already voted from this device. Thank you!");
}

SONGS.forEach(song => {
  const li = document.createElement("li");
  const label = document.createElement("label");
  const cb = document.createElement("input");
  cb.type = "checkbox";
  cb.value = song.id;
  cb.addEventListener("change", () => onToggle(cb, label));
  label.appendChild(cb);
  label.appendChild(document.createTextNode(song.title));
  li.appendChild(label);
  list.appendChild(li);
});

function onToggle(cb, label) {
  if (cb.checked) selected.add(cb.value); else selected.delete(cb.value);
  label.classList.toggle("checked", cb.checked);
  selectedCountEl.textContent = selected.size;
  const atMax = selected.size >= MAX;
  document.querySelectorAll("#songs input").forEach(box => {
    if (!box.checked) {
      box.disabled = atMax;
      box.closest("label").classList.toggle("disabled", atMax);
    }
  });
  submitBtn.disabled = selected.size !== MAX;
}

submitBtn.addEventListener("click", async () => {
  submitBtn.disabled = true;
  submitBtn.textContent = "Sending…";
  try {
    // Everything is validated server-side: token, whether voting is open,
    // exactly 3 titles, no duplicates, all from this concert's real setlist.
    const res = await fetch(SUPABASE_URL + "/rest/v1/rpc/cast_ballot", {
      method: "POST",
      headers: {
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": "Bearer " + SUPABASE_ANON_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        p_concert_id: CONCERT_ID,
        p_token: TOKEN,
        p_song_ids: [...selected]
      })
    });
    if (!res.ok) throw new Error(await res.text());
    const status = await res.json();
    if (status === "ok") {
      localStorage.setItem("voted-" + CONCERT_ID, "1");
      showDone("Thank you, your vote has been recorded!");
    } else if (status === "closed") {
      showGate("<strong>Voting is not open</strong>" +
               "Voting takes place during the concert.");
    } else {
      showGate("<strong>Invalid voting link</strong>" +
               "Please scan the QR code printed on the programme.");
    }
  } catch (e) {
    submitBtn.disabled = false;
    submitBtn.textContent = "Submit my vote";
    alert("Something went wrong. Please try again.\n\n" + e.message);
  }
});

function showDone(msg) {
  document.getElementById("app").innerHTML =
    '<div class="done"><div class="check">✓</div><p>' + msg + '</p></div>';
}

function showGate(html) {
  document.getElementById("app").innerHTML =
    '<div class="gate"><div class="icon">▣</div><p>' +
    (html || "<strong>Voting is reserved for the concert audience</strong>" +
             "Please scan the QR code printed on the programme to vote.") +
    '</p></div>';
}
</script>
</body>
</html>
