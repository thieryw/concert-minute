<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark light">
<meta name="theme-color" content="#12100E">
<title>Live results</title>
<style>
  :root {
    --bg:      #12100E;
    --line:    #322C25;
    --track:   #241F1A;
    --ink:     #E8E3D9;
    --dim:     #A39B8D;
    --gold:    #BDA66B;
    --heat1:   #FFC46B;   /* hottest — most requested            */
    --heat2:   #C99A4A;
    --heat3:   #A88F49;   /* coolest of the three                */
    color-scheme: dark;
  }
  /* Read on a phone in daylight as often as projected in the hall, so it
     follows the device preference. Heats are darkened for light backgrounds;
     rank numerals fall back to --ink there to stay legible. */
  @media (prefers-color-scheme: light) {
    :root {
      --bg:    #FAF9F6;
      --line:  #E2DCD0;
      --track: #E6E0D4;
      --ink:   #2A2318;
      --dim:   #6E6659;
      --gold:  #7A6636;
      --heat1: #C06A12;
      --heat2: #997528;
      --heat3: #7A6A3E;
      color-scheme: light;
    }
    .rank { color: var(--ink) !important; }
  }
  * { box-sizing: border-box; }
  html, body { background: var(--bg); }
  body { max-width: 760px; margin: 0 auto; padding: clamp(20px, 3vw, 40px);
         color: var(--ink); font-family: system-ui, -apple-system, sans-serif;
         line-height: 1.45; -webkit-text-size-adjust: 100%; }

  .lang-switcher { display: flex; justify-content: flex-end; gap: 6px; margin-bottom: 20px; }
  .lang-switcher a { min-width: 44px; text-align: center; padding: 8px 11px; font-size: .78rem;
                     font-weight: 700; letter-spacing: .14em; text-decoration: none;
                     border: 1px solid var(--line); border-radius: 6px; color: var(--dim); }
  .lang-switcher a.active { background: var(--gold); border-color: var(--gold); color: #12100E; }

  .eyebrow { margin: 0 0 10px; font-size: clamp(.68rem, 1.1vw, .85rem); letter-spacing: .3em;
             text-transform: uppercase; color: var(--gold); }
  h1 { margin: 0 0 8px; font-family: Georgia, "Times New Roman", serif; font-weight: 400;
       font-size: clamp(1.6rem, 4.2vw, 3rem); line-height: 1.1; }
  .sub { margin: 0 0 6px; color: var(--dim); font-size: clamp(.82rem, 1.5vw, 1.05rem); }
  .live { display: inline-flex; align-items: center; gap: 7px; margin: 0 0 22px;
          color: var(--dim); font-size: clamp(.72rem, 1.3vw, .9rem); letter-spacing: .04em; }
  .live .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--heat1);
               animation: live 1.6s ease-in-out infinite; }
  @keyframes live { 50% { opacity: .25 } }
  .rule { width: 44px; height: 1px; background: var(--gold); opacity: .7; margin: 0 0 26px; }

  .row { display: grid; grid-template-columns: auto 1fr auto; align-items: baseline;
         column-gap: 14px; margin: 0 0 clamp(16px, 2.4vw, 26px); }
  .rank { grid-row: 1; font-variant-numeric: tabular-nums; font-weight: 700; line-height: 1;
          font-size: clamp(1rem, 2.4vw, 1.7rem); }
  .r1 .rank { color: var(--heat1); }
  .r2 .rank { color: var(--heat2); }
  .r3 .rank { color: var(--heat3); }
  .name { grid-row: 1; font-size: clamp(.98rem, 2vw, 1.4rem); color: var(--ink); }
  .pct  { grid-row: 1; font-variant-numeric: tabular-nums; font-weight: 600; color: var(--ink);
          font-size: clamp(.95rem, 1.9vw, 1.35rem); }
  .track { grid-column: 1 / -1; grid-row: 2; margin-top: 8px; background: var(--track);
           border-radius: 5px; overflow: hidden; height: clamp(12px, 1.8vw, 22px); }
  .fill { height: 100%; width: 0; border-radius: 5px; transition: width .5s ease; }
  .r1 .fill { background: var(--heat1); }
  .r2 .fill { background: var(--heat2); }
  .r3 .fill { background: var(--heat3); }
  .caption { margin: 4px 0 0; color: var(--dim); font-size: clamp(.7rem, 1.2vw, .82rem); }

  .skel   { height: clamp(12px, 1.8vw, 22px); border-radius: 5px; background: var(--track);
            margin-top: 8px; animation: shim 1.5s ease-in-out infinite; }
  .skel-t { height: .9em; width: var(--w, 55%); border-radius: 4px; background: var(--track);
            animation: shim 1.5s ease-in-out infinite; }
  @keyframes shim { 50% { opacity: .42 } }

  .empty, .fail { padding: 44px 24px; text-align: center; border: 1px solid var(--line);
                  border-radius: 12px; }
  .fail { border-color: var(--gold); }
  .empty strong, .fail strong { display: block; margin-bottom: 8px; font-weight: 400;
         font-family: Georgia, "Times New Roman", serif; font-size: clamp(1.1rem, 2.4vw, 1.5rem); }
  .empty span, .fail span { color: var(--dim); font-size: clamp(.85rem, 1.5vw, 1rem); }
  .fail button { margin-top: 18px; min-height: 48px; padding: 0 26px; background: transparent;
                 border: 1px solid var(--gold); border-radius: 8px; color: var(--gold);
                 font: inherit; cursor: pointer; }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>
<div class="lang-switcher">
  <a href="results.html">FR</a>
  <a href="results-en.html" class="active">EN</a>
</div>
<p class="eyebrow">✦ Minute Concerts</p>
<h1>Live results</h1>
<p class="sub">The three most requested pieces, played before the end of the concert.</p>
<p class="live"><span class="dot"></span>live</p>
<div class="rule"></div>
<div id="results"></div>

<script>
// ========== CONFIG : à remplir (mêmes valeurs que vote.html) ==========
const SUPABASE_URL      = "https://emcntansodqcrjiwsmpg.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_XtiLwWVgGoIoR29HUBaAYQ_qDoVW0AK";
// Ouvrez cette page avec le concert voulu dans l'URL :  results.html#c=<id>
const CONCERT_ID        = new URLSearchParams(location.hash.slice(1)).get("c") || "bordeaux-2026-01";
// Facultatif : afficher les titres complets au lieu des id
const TITLES = {
  "ravel-pavane":                      "Ravel — Pavane for a Dead Princess",
  "faure-apres-un-reve":               "Fauré — After a Dream",
  "tailleferre-quatuor":               "Tailleferre — String Quartet",
  "carreno-quatuor":                   "Teresa Carreño — String Quartet in B minor",
  "imogen-holst-phantasy":             "Imogen Holst — Phantasy Quartet",
  "debussy-quatuor-1":                 "Debussy — Quartet, I. Animé et très décidé",
  "ravel-quatuor-2":                   "Ravel — Quartet, II. Assez vif",
  "borodine-nocturne":                 "Borodin — Nocturne (Quartet No. 2)",
  "barber-adagio":                     "Barber — Adagio (Quartet Op. 11)",
  "puccini-crisantemi":                "Puccini — Crisantemi",
  "mozart-dissonances-1":              "Mozart — “Dissonance” Quartet, I",
  "haydn-empereur-2":                  "Haydn — “Emperor” Quartet, II. Poco adagio",
  "schubert-jeune-fille-2":            "Schubert — Death and the Maiden, II",
  "beethoven-op18-1-adagio":           "Beethoven — Quartet Op. 18 No. 1, II. Adagio",
  "dvorak-americain-2":                "Dvořák — “American” Quartet, II. Lento",
  "fanny-mendelssohn-quatuor":         "Fanny Mendelssohn — Quartet in E-flat",
  "boulanger-nocturne":                "Lili Boulanger — Nocturne (arr.)",
  "clara-schumann-romance":            "Clara Schumann — Romance Op. 22 No. 1 (arr.)",
  "price-folksongs":                   "Florence Price — Five Folksongs in Counterpoint",
  "bacewicz-quatuor-4":                "Bacewicz — Quartet No. 4, II",
  "coleridge-taylor-fantasiestucke":   "Coleridge-Taylor — Fantasiestücke, II",
  "sibelius-voces-intimae-3":          "Sibelius — Voces intimae, III. Adagio",
  "chostakovitch-8-2":                 "Shostakovich — Quartet No. 8, II",
  "janacek-kreutzer-1":                "Janáček — Kreutzer Sonata, I",
  "grieg-quatuor-op27-2":              "Grieg — Quartet Op. 27, II. Romanze",
  "bartok-danses-roumaines":           "Bartók — Romanian Folk Dances (arr.)",
  "glass-mishima-3":                   "Glass — Quartet No. 3 “Mishima”, III",
  "piazzolla-oblivion":                "Piazzolla — Oblivion (arr.)",
  "gershwin-lullaby":                  "Gershwin — Lullaby",
  "elgar-salut-damour":                "Elgar — Salut d’Amour (arr.)",
};
// =====================================================================

document.querySelectorAll(".lang-switcher a").forEach(a => {
  a.href = a.getAttribute("href").split("#")[0] + location.hash;   // carry #c=<id>
});

const box = document.getElementById("results");
let loadedOnce = false;

function skeleton() {
  return [1, 2, 3].map(() =>
    '<div class="row"><div class="skel-t"></div><div class="skel" style="grid-column:1/-1"></div></div>'
  ).join("");
}

async function load() {
  if (!loadedOnce) box.innerHTML = skeleton();
  try {
    const res = await fetch(SUPABASE_URL + "/rest/v1/rpc/get_vote_counts", {
      method: "POST",
      headers: {
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": "Bearer " + SUPABASE_ANON_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ p_concert_id: CONCERT_ID })
    });
    if (!res.ok) throw new Error(res.status);
    render(await res.json());
    loadedOnce = true;
  } catch (e) {
    showFail();
  }
}

function showFail() {
  box.innerHTML =
    '<div class="fail"><strong>Results temporarily unavailable</strong>' +
    '<span>Couldn’t reach the server. The page will keep trying on its own.</span><br>' +
    '<button type="button" id="again">Try again now</button></div>';
  document.getElementById("again").addEventListener("click", load);
}

function render(data) {
  if (!Array.isArray(data) || !data.length) {
    box.innerHTML =
      '<div class="empty"><strong>No votes yet</strong><span>The ranking will appear here as soon as the first ballot arrives.</span></div>';
    return;
  }
  // Total ballots: every ballot is exactly 3 picks, so sum / 3.
  const ballots = data.reduce((s, d) => s + Number(d.votes), 0) / 3;

  // Rank by votes; ties broken alphabetically by title; then keep the top 3.
  const top = data
    .map(d => ({ id: d.song_id, votes: Number(d.votes), title: TITLES[d.song_id] || d.song_id }))
    .sort((a, b) => b.votes - a.votes || a.title.localeCompare(b.title, "en"))
    .slice(0, 3);

  box.innerHTML = top.map((d, i) => {
    const share = ballots ? Math.round(d.votes / ballots * 100) : 0;
    return '<div class="row r' + (i + 1) + '">' +
      '<span class="rank">' + (i + 1) + '</span>' +
      '<span class="name">' + d.title + '</span>' +
      '<span class="pct">' + share + '%</span>' +
      '<div class="track"><div class="fill" style="width:' + share + '%"></div></div>' +
    '</div>';
  }).join("") +
  '<p class="caption">% = share of the audience who chose the piece.</p>';
}

load();
setInterval(load, 5000);
</script>
</body>
</html>
